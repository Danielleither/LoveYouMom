<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Mom 💐</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #fdf6f0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 192, 180, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255, 210, 195, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(253, 240, 230, 0.3) 0%, transparent 60%);
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      letter-spacing: 0.25em;
      font-size: 0.7rem;
      color: #8a4a30;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 400;
      color: #3a1a0e;
      line-height: 1.1;
    }

    header h1 em {
      font-style: italic;
      color: #8b3a20;
    }

    .card {
      background: rgba(255, 252, 248, 0.85);
      border: 1px solid rgba(210, 160, 140, 0.3);
      border-radius: 18px;
      max-width: 440px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(180, 100, 70, 0.08);
    }

    .photo-frame {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      position: relative;
      background: #f0ddd5;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .photo-frame img.loaded { opacity: 1; }

    .photo-frame .fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #b57a68;
    }

    .photo-frame .fallback .flower { font-size: 2.5rem; }
    .photo-frame .fallback p { font-size: 0.8rem; font-family: 'Lato', sans-serif; opacity: 0.7; }

    .card-body {
      padding: 1.6rem 1.8rem 2rem;
    }

    .day-label {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c0826a;
      margin-bottom: 0.8rem;
    }

    .message {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.15rem, 3.5vw, 1.35rem);
      color: #4a2318;
      line-height: 1.65;
      margin-bottom: 1.4rem;
    }

    .message em { font-style: italic; color: #8b3d28; }

    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(to right, transparent, #d4a090, transparent);
      margin: 0 auto 1.4rem;
    }

    .timestamp {
      text-align: center;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: #b08070;
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Just wanted to say</p>
    <h1>We love you<br><em>Mom</em></h1>
  </header>

  <div class="card">
    <div class="photo-frame">
      <div class="fallback" id="fallback">
        <div class="flower">🌸</div>
        <p>Loading your memory...</p>
      </div>
      <img id="daily-photo" alt="A special memory" />
    </div>
    <div class="card-body">
      <p class="day-label" id="day-label">Today's memory</p>
      <p class="message" id="daily-message">Loading your message...</p>
      <div class="divider"></div>
      <p class="timestamp" id="timestamp"></p>
    </div>
  </div>

  <script>
    // ============================================================
    //  ✏️  YOUR MEMORIES — add as many blocks as you want!
    //  Each { } block = one photo + one message + who it's from
    //  RULES:
    //    - photo link must start with https://i.imgur.com/
    //    - everything must be inside "quotes"
    //    - each block must end with a comma  ,
    // ============================================================
    const memories = [
      {
        photo: "https://i.imgur.com/yv3uBt6.jpeg",
        message: "I love you as much as I love potatoes",
        from: "Daniel"
      },
      {
        photo: "https://i.imgur.com/fGfJe5I.jpeg",
        message: "Life is a corn maze- just keep walking and you'll find your way",
        from: "Daniel"
      },
      {
        photo: "https://i.imgur.com/XywhpIU.jpeg",
        message: "Message",
        from: "Daniel"
      },
      {
        photo: "https://i.imgur.com/p5zL56s.jpeg",
        message: "Raising me was probably a full time job. Thanks for not giving up!",
        from: "Daniel"
      },
      // ---- Copy and paste a block like this to add more: -------
      // {
      //   photo: "https://i.imgur.com/YOUR_LINK.jpeg",
      //   message: "Your personal message here",
      //   from: "Your Name"
      // },
    ];

    // ---- Logic (no need to edit below this line) ---------------

    function getDayOfYear() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 0);
      const diff = now - start;
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function formatDate(date) {
      return date.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    function formatTime(date) {
      return date.toLocaleTimeString('en-US', {
        hour: 'numeric', minute: '2-digit', hour12: true
      });
    }

    const today = new Date();
    const index = getDayOfYear() % memories.length;
    const currentMemory = memories[index];

    // Set message and name
    document.getElementById('daily-message').innerHTML =
      currentMemory.message + ` &mdash; <em>${currentMemory.from}</em>`;

    // Hide the memory counter label
    document.getElementById('day-label').style.display = 'none';


    // Load the photo
    const img = document.getElementById('daily-photo');
    img.src = currentMemory.photo;
    img.onload = function () {
      this.classList.add('loaded');
      document.getElementById('fallback').style.display = 'none';
    };
    img.onerror = function () {
      document.getElementById('fallback').querySelector('p').textContent =
        'Photo could not load — check your Imgur link';
    };

  </script>

</body>
</html>
