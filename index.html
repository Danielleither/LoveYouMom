<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #fdf6f0;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 192, 180, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(255, 210, 195, 0.2) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(253, 240, 230, 0.3) 0%, transparent 60%);
      font-family: 'Lato', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.2rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header .eyebrow {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      letter-spacing: 0.25em;
      font-size: 0.7rem;
      color: #8a4a30;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 8vw, 3.8rem);
      font-weight: 400;
      color: #3a1a0e;
      line-height: 1.1;
    }

    header h1 em {
      font-style: italic;
      color: #8b3a20;
    }

    .album-wrapper {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      width: 100%;
      max-width: 520px;
    }

    .arrow-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(210, 160, 140, 0.5);
      background: rgba(255, 252, 248, 0.85);
      color: #8b3a20;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 8px rgba(180, 100, 70, 0.1);
      -webkit-tap-highlight-color: transparent;
    }

    .arrow-btn:hover { background: #f5e6df; }
    .arrow-btn:active { transform: scale(0.93); }

    .card {
      background: rgba(255, 252, 248, 0.85);
      border: 1px solid rgba(210, 160, 140, 0.3);
      border-radius: 18px;
      flex: 1;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(180, 100, 70, 0.08);
    }

    .photo-frame {
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      position: relative;
      background: #f0ddd5;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease;
      position: absolute;
      top: 0; left: 0;
    }

    .photo-frame img.loaded { opacity: 1; }

    .photo-frame .fallback {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #b57a68;
    }

    .photo-frame .fallback .flower { font-size: 2.5rem; }
    .photo-frame .fallback p { font-size: 0.8rem; font-family: 'Lato', sans-serif; opacity: 0.7; }

    .card-body {
      padding: 1.6rem 1.8rem 2rem;
    }

    .counter {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c0826a;
      margin-bottom: 0.8rem;
    }

    .message {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.15rem, 3.5vw, 1.35rem);
      color: #4a2318;
      line-height: 1.65;
      min-height: 3.5rem;
      transition: opacity 0.3s ease;
    }

    .message em { font-style: italic; color: #8b3d28; }

    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 1.2rem;
      flex-wrap: wrap;
      max-width: 200px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d4a090;
      opacity: 0.35;
      transition: opacity 0.3s;
    }

    .dot.active { opacity: 1; }
  </style>
</head>
<body>

    // ---- Shuffle randomly --------------------------------------
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const shuffled = shuffle(memories);
    let current = 0;

    // ---- Build dots --------------------------------------------
    const dotsEl = document.getElementById('dots');
    shuffled.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      dotsEl.appendChild(d);
    });

    function updateDots() {
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    // ---- Show a memory -----------------------------------------
    function showMemory(index) {
      const m = shuffled[index];
      const img = document.getElementById('daily-photo');
      const msgEl = document.getElementById('daily-message');
      const fallback = document.getElementById('fallback');

      msgEl.style.opacity = '0';

      img.classList.remove('loaded');
      img.src = '';
      fallback.style.display = 'flex';
      fallback.querySelector('p').textContent = 'Loading your memory...';

      img.src = m.photo;
      img.onload = function () {
        this.classList.add('loaded');
        fallback.style.display = 'none';
      };
      img.onerror = function () {
        fallback.querySelector('p').textContent = 'Photo could not load — check your Imgur link';
      };

      setTimeout(() => {
        msgEl.innerHTML = m.message + ` &mdash; <em>${m.from}</em>`;
        msgEl.style.opacity = '1';
      }, 150);

      updateDots();
    }

    // ---- Arrows ------------------------------------------------
    document.getElementById('prev-btn').addEventListener('click', () => {
      current = (current - 1 + shuffled.length) % shuffled.length;
      showMemory(current);
    });

    document.getElementById('next-btn').addEventListener('click', () => {
      current = (current + 1) % shuffled.length;
      showMemory(current);
    });

    // ---- Swipe support -----------------------------------------
    let touchStartX = 0;
    const card = document.querySelector('.card');
    card.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    card.addEventListener('touchend', e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) {
        current = diff > 0
          ? (current + 1) % shuffled.length
          : (current - 1 + shuffled.length) % shuffled.length;
        showMemory(current);
      }
    });

    // ---- Initial load ------------------------------------------
    showMemory(0);
